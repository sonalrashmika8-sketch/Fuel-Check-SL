<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Check SL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fuel Check">
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --primary-blue: #0096FF;
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --input-bg: #0f172a; 
            --input-border: #334155; 
            --success-bg: rgba(34, 197, 94, 0.2);
            --danger-bg: rgba(239, 68, 68, 0.2);
            --cal-box: #475569;
            --accent-gold: #fbbf24;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --success-bg: rgba(34, 197, 94, 0.1);
            --danger-bg: rgba(239, 68, 68, 0.1);
            --cal-box: #f3f4f6;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: calc(40px + env(safe-area-inset-top));
            min-height: 100vh;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* --- New Entrance Animation --- */
        .container {
            background: var(--card-bg);
            padding: 2rem 1.5rem;
            border-radius: 28px;
            width: 92%;
            max-width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
            box-sizing: border-box;
            animation: containerEntry 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        h1 { margin: 0; font-size: 1.4rem; color: var(--primary-blue); font-weight: 800; letter-spacing: -0.5px; }
        
        .clock-display {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            text-align: left;
            font-family: 'Courier New', monospace;
            opacity: 0.8;
        }

        .top-buttons { display: flex; gap: 10px; }
        .btn-circle { background: var(--cal-box); color: var(--text-main); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: transform 0.2s; }
        .btn-circle:active { transform: scale(0.9); }
        
        .btn-lang { background: var(--primary-blue); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.3s ease; }
        .btn-lang:hover { filter: brightness(1.1); }

        .input-label { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; display: block; opacity: 0.9; }

        .input-wrapper { position: relative; width: 100%; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 1.2rem;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 20px;
            color: var(--text-main);
            font-size: 2.2rem;
            text-align: center;
            box-sizing: border-box;
            font-weight: 800;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--primary-blue); box-shadow: 0 0 15px rgba(0, 150, 255, 0.3); transform: translateY(-2px); }
        input.complete { border-color: #22c55e; color: #22c55e; }

        .btn-check {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.3);
        }
        .btn-check:active { transform: scale(0.97); }

        /* --- Animated Status Cards --- */
        .status-card {
            margin-top: 1.5rem;
            padding: 1.2rem;
            border-radius: 20px;
            display: none;
            font-weight: 700;
            overflow: hidden;
            position: relative;
        }
        .status-card.show { 
            display: block; 
            animation: slideBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        @keyframes slideBounce {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .status-msg { font-size: 1.2rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .can { background: var(--success-bg); color: #4ade80; border: 2px solid #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .cannot { background: var(--danger-bg); color: #f87171; border: 2px solid #ef4444; }

        /* --- Staggered Reveal for Sections --- */
        #nextDatesSection.show, #calSection.show { 
            display: block; 
            animation: fadeIn 0.6s ease-out; 
        }

        .section-head { font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 1.5rem; }
        
        .next-dates-list { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .next-date-item { 
            background: var(--cal-box); 
            padding: 10px 14px; 
            border-radius: 14px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            border: 1px solid var(--input-border);
            animation: popIn 0.4s both;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .date-box { 
            background: var(--cal-box); 
            padding: 10px 0; 
            border-radius: 12px; 
            transition: all 0.3s;
        }
        .date-box span { font-size: 0.6rem; text-transform: uppercase; }
        .date-box b { display: block; font-size: 1rem; margin-top: 2px; }
        
        .active-date { 
            background: var(--primary-blue) !important; 
            color: white !important; 
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(0, 150, 255, 0.4);
        }
        .today-mark { border: 2px solid var(--accent-gold); position: relative; }
        .today-mark::after {
            content: ''; position: absolute; top: -5px; right: -5px; width: 10px; height: 10px;
            background: var(--accent-gold); border-radius: 50%; animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(251, 191, 36, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg); padding: 2rem; border-radius: 24px;
            width: 85%; max-width: 320px; text-align: center;
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body data-theme="dark">

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <p id="modalMsg" style="font-weight: 600; margin-bottom: 1.5rem; font-size: 1.1rem;"></p>
        <button class="btn-check" onclick="closeModal()" id="ui-close-btn">Got it</button>
    </div>
</div>

<div class="container">
    <div class="controls-row">
        <h1 id="ui-title">Fuel Check SL</h1>
        <div class="top-buttons">
            <button class="btn-circle" onclick="toggleTheme()" id="themeBtn">☀️</button>
            <button class="btn-lang" onclick="toggleLang()" id="langBtn">සිංහල</button>
        </div>
    </div>
    
    <div id="digitalClock" class="clock-display">00:00:00 AM</div>

    <div class="input-section">
        <span class="input-label" id="ui-input-label">Enter 4 digits of vehicle number:</span>
        <div class="input-wrapper">
            <input type="text" id="plateInput" maxlength="4" placeholder="1234" inputmode="numeric" oninput="validateInput(this)">
        </div>
        <button class="btn-check" onclick="handleCheck()" id="ui-btn">Check Ability</button>
    </div>

    <div id="status" class="status-card">
        <div class="status-msg" id="ui-status-msg"></div>
    </div>

    <div id="nextDatesSection" style="display:none">
        <div class="section-head" id="ui-next-head">Next eligible dates:</div>
        <div class="next-dates-list" id="nextDatesList"></div>
    </div>

    <div id="calSection" style="display:none">
        <div class="section-head" id="ui-cal-head">Weekly Overview:</div>
        <div class="week-grid" id="weekGrid"></div>
    </div>
</div>

<script>
    let currentLangIndex = 0; 
    const langs = ['en', 'si', 'ta'];
    
    const ui = {
        en: { 
            inputLabel: "Enter 4 digits of vehicle number:", btn: "Check Ability", 
            can: "You can get fuel today!", cannot: "You cannot get fuel today.", 
            head: "Weekly Overview:", next: "Next eligible dates:", 
            alert: "Please enter exactly 4 digits", close: "Got it",
            days: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], btnLabel: "සිංහල"
        },
        si: { 
            inputLabel: "අවසාන ඉලක්කම් 4 ඇතුළත් කරන්න:", btn: "පරීක්ෂා කරන්න", 
            can: "අද ඉන්ධන ලබාගත හැක!", cannot: "අද ඉන්ධන ලබාගත නොහැක.", 
            head: "සතිපතා දින දර්ශනය:", next: "ඊළඟට අවසර ඇති දින:", 
            alert: "කරුණාකර ඉලක්කම් 4ම ඇතුළත් කරන්න", close: "තේරුණා",
            days: ['ඉරිදා','සඳුදා','අඟහ','බදාදා','බ්‍රහස්','සිකු','සෙන'], btnLabel: "தமிழ்"
        },
        ta: { 
            inputLabel: "கடைசி 4 எண்களை இடவும்:", btn: "பரிசோதிக்கவும்", 
            can: "இன்று நீங்கள் பெறலாம்!", cannot: "இன்று பெற முடியாது.", 
            head: "வாராந்திர அட்டவணை:", next: "அடுத்த தேதிகள்:", 
            alert: "தயவுசெய்து 4 எண்களை உள்ளிடவும்", close: "சரி",
            days: ['ஞாயி','திங்','செவ்','புதன்','வியா','வெள்','சனி'], btnLabel: "English"
        }
    };

    function validateInput(el) {
        el.value = el.value.replace(/[^0-9]/g, '');
        if(el.value.length === 4) {
            el.classList.add('complete');
        } else {
            el.classList.remove('complete');
            hideResults();
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('digitalClock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function hideResults() {
        document.getElementById('status').classList.remove('show');
        document.getElementById('nextDatesSection').style.display = 'none';
        document.getElementById('calSection').style.display = 'none';
    }

    function showModal() {
        const trans = ui[langs[currentLangIndex]];
        document.getElementById('modalMsg').innerText = trans.alert;
        document.getElementById('ui-close-btn').innerText = trans.close;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'dark' ? '☀️' : '🌙';
    }

    function toggleLang() {
        currentLangIndex = (currentLangIndex + 1) % langs.length;
        const trans = ui[langs[currentLangIndex]];
        document.getElementById('ui-input-label').innerText = trans.inputLabel;
        document.getElementById('langBtn').innerText = trans.btnLabel;
        document.getElementById('ui-btn').innerText = trans.btn;
        document.getElementById('ui-cal-head').innerText = trans.head;
        document.getElementById('ui-next-head').innerText = trans.next;
        if(document.getElementById('status').classList.contains('show')) handleCheck();
    }

    function handleCheck() {
        const input = document.getElementById('plateInput').value.trim();
        const trans = ui[langs[currentLangIndex]];
        if (input.length !== 4) { showModal(); return; }

        const isPlateOdd = parseInt(input.slice(-1)) % 2 !== 0;
        const now = new Date();
        const todayDate = now.getDate();
        const isTodayOdd = todayDate % 2 !== 0;
        const isMatch = (isPlateOdd === isTodayOdd);
        
        // Results reset
        const status = document.getElementById('status');
        status.classList.remove('show');
        
        setTimeout(() => {
            document.getElementById('ui-status-msg').innerHTML = isMatch ? `✅ ${trans.can}` : `❌ ${trans.cannot}`;
            status.className = `status-card show ${isMatch ? 'can' : 'cannot'}`;

            const nextList = document.getElementById('nextDatesList');
            nextList.innerHTML = '';
            let found = 0, checkDate = new Date();
            checkDate.setDate(checkDate.getDate() + 1);
            while (found < 3) {
                if ((checkDate.getDate() % 2 !== 0) === isPlateOdd) {
                    const item = document.createElement('div');
                    item.className = 'next-date-item';
                    item.style.animationDelay = `${found * 0.1}s`;
                    item.innerText = `${checkDate.getDate()} (${trans.days[checkDate.getDay()]})`;
                    nextList.appendChild(item);
                    found++;
                }
                checkDate.setDate(checkDate.getDate() + 1);
            }
            document.getElementById('nextDatesSection').style.display = 'block';
            document.getElementById('nextDatesSection').classList.add('show');

            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';
            const startOfWeek = now.getDate() - now.getDay();
            for (let i = 0; i < 7; i++) {
                const date = new Date(new Date().setDate(startOfWeek + i));
                const dNum = date.getDate();
                const box = document.createElement('div'); 
                box.className = 'date-box';
                box.style.animation = `popIn 0.3s both ${i * 0.05}s`;
                if (dNum === todayDate) box.classList.add('today-mark');
                if ((dNum % 2 !== 0) === isPlateOdd) box.classList.add('active-date');
                box.innerHTML = `<span>${trans.days[i]}</span><b>${dNum}</b>`;
                grid.appendChild(box);
            }
            document.getElementById('calSection').style.display = 'block';
            document.getElementById('calSection').classList.add('show');
        }, 50);
    }
</script>
</body>
</html>
