<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fuel Check SL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fuel Check">
    
    <style>
        :root {
            --primary-blue: #007AFF;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-gold: #FFD60A;
            --success-green: #32D74B;
            --bg-top: #000000;
            --bg-bottom: #1c1c1e;
            --card-outline: rgba(255, 255, 255, 0.08);
            --modal-bg: #1c1c1e;
        }

        [data-theme="light"] {
            --bg-top: #ffffff;
            --bg-bottom: #f2f2f7;
            --text-main: #000000;
            --text-muted: rgba(0, 0, 0, 0.6);
            --glass-bg: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-outline: rgba(0, 0, 0, 0.06);
            --modal-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: calc(20px + env(safe-area-inset-top));
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            box-sizing: border-box;
            animation: fadeIn 0.6s ease-out;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
        
        /* space for your logo image */
        .header-logo {
            width: 50px; height: 50px; margin: 0 15px;
            background: url('YOUR_LOGO_URL_HERE') no-repeat center;
            background-size: contain;
            display: none; /* Hide if no URL */
        }

        .top-controls { display: flex; gap: 12px; align-items: center; }

        .theme-switch {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 18px;
        }
        [data-theme="light"] .theme-switch { background: rgba(0,0,0,0.05); }

        .lang-switch {
            background: rgba(120, 120, 128, 0.16);
            border-radius: 20px;
            padding: 3px;
            display: flex;
        }

        .lang-btn {
            border: none;
            background: transparent;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 17px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }
        .lang-btn.active { background: var(--primary-blue); color: white; }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .clock {
            font-size: 14px;
            color: var(--primary-blue);
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(120, 120, 128, 0.1);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-main);
            font-size: 38px;
            font-weight: 800;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            letter-spacing: 8px;
        }
        input:focus { border-color: var(--primary-blue); background: rgba(120, 120, 128, 0.15); }
        input.error { animation: shake 0.4s ease; border-color: #FF453A; }

        .btn-main {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s ease;
        }
        .btn-main:active { transform: scale(0.97); }

        .status-msg {
            margin-top: 25px;
            padding: 20px;
            border-radius: 22px;
            font-weight: 700;
            display: none;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .status-msg.show { display: block; }
        .can { background: rgba(50, 215, 75, 0.15); color: #32D74B; border: 1px solid rgba(50, 215, 75, 0.3); }
        .cannot { background: rgba(255, 69, 58, 0.15); color: #FF453A; border: 1px solid rgba(255, 69, 58, 0.3); }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal {
            background: var(--modal-bg);
            border: 1px solid var(--glass-border);
            width: 85%; max-width: 320px;
            padding: 30px; border-radius: 28px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .modal h3 { margin: 0 0 10px 0; font-size: 20px; }
        .modal p { color: var(--text-muted); font-size: 15px; margin-bottom: 20px; }
        .modal-btn {
            background: var(--primary-blue); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .section { margin-top: 35px; display: none; }
        .section.show { display: block; animation: fadeIn 0.8s ease; }
        .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* NEXT DATES - removed sliding, made static chips */
        .date-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .date-chip { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 12px 18px; border-radius: 15px; font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }
        [data-theme="light"] .date-chip { background: white; }

        /* WEEKLY SCHEDULE - matches image 2nd */
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-cell {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 0;
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        [data-theme="light"] .day-cell { background: white; }
        .day-cell b { font-size: 15px; color: var(--text-main); margin-top: 4px; }
        
        .day-today { border: 2px solid var(--accent-gold); }
        .day-today::before {
            content: attr(data-today);
            position: absolute;
            top: -10px;
            background: var(--accent-gold);
            color: black;
            font-size: 7px;
            font-weight: 900;
            padding: 1px 5px;
            border-radius: 4px;
        }
        
        .day-active { background: var(--primary-blue); color: white; border: none; }
        .day-active b { color: white; }

    </style>
</head>
<body data-theme="dark">

<div class="modal-overlay" id="alertModal">
    <div class="modal">
        <h3 id="modal-title">⚠️ Invalid Number</h3>
        <p id="modal-body">Please enter all 4 digits of your vehicle number.</p>
        <button class="modal-btn" onclick="closeModal()">Got it</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div class="title">Fuel Check SL</div>
        
        <div class="header-logo"></div>
        
        <div class="top-controls">
            <div class="theme-switch" onclick="toggleTheme()" id="t-btn">🌙</div>
            <div class="lang-switch">
                <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
                <button class="lang-btn" onclick="setLang('si')" id="btn-si">සිං</button>
                <button class="lang-btn" onclick="setLang('ta')" id="btn-ta">தழ்</button>
            </div>
        </div>
    </div>

    <div class="main-card">
        <div id="clock" class="clock">00:00:00 AM</div>
        <input type="text" id="plateInput" placeholder="••••" inputmode="numeric" maxlength="4" oninput="this.value = this.value.replace(/[^0-9]/g, ''); hideStatus();">
        <button class="btn-main" onclick="check()">
            <span></span> <span id="btn-text">Check</span>
        </button>
        <div id="status" class="status-msg"></div>
    </div>

    <div id="nextDatesSec" class="section">
        <div class="section-title"><span>📅</span> <span id="lbl-next">Next Eligible Dates</span></div>
        <div class="date-list" id="nextDatesList"></div>
    </div>

    <div id="calSec" class="section">
        <div class="section-title"><span>🗓️</span> <span id="lbl-cal">Weekly Schedule</span></div>
        <div class="week-grid" id="weekGrid"></div>
    </div>
</div>

<script>
    let lang = 'en';
    const ui = {
        en: { check: "Check", can: "Eligible for fuel today!", cannot: "Not eligible today.", next: "Next Eligible Dates", cal: "Weekly Schedule", today: "TODAY", modalT: "Invalid Number", modalB: "Please enter the last 4 digits of your vehicle registration number.", days: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'] },
        si: { check: "පරීක්ෂා කරන්න", can: "අද දින ලබාගත හැක!", cannot: "අද දින ලබාගත නොහැක.", next: "මීළඟ දින", cal: "සතිපතා කාලසටහන", today: "අද", modalT: "වැරදි අංකයකි", modalB: "කරුණාකර ඔබගේ වාහන අංකයේ අවසාන ඉලක්කම් 4ම ඇතුළත් කරන්න.", days: ['ඉරිදා','සඳුදා','අඟහ','බදාදා','බ්‍රහස්','සිකු','සෙන'] },
        ta: { check: "பரிசோதிக்கவும்", can: "இன்று பெறலாம்!", cannot: "இன்று பெற முடியாது.", next: "அடுத்த தேதிகள்", cal: "வாராந்திர அட்டவணை", today: "இன்று", modalT: "தவறான எண்", modalB: "உங்கள் வாகனப் பதிவு எண்ணின் கடைசி 4 இலக்கங்களை உள்ளிடவும்.", days: ['ஞாயி','திங்','செவ்','புதன்','வியா','வெள்','சனி'] }
    };

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000); updateClock();

    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', next);
        document.getElementById('t-btn').innerText = next === 'dark' ? '🌙' : '☀️';
    }

    function setLang(l) {
        lang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${l}`).classList.add('active');
        document.getElementById('btn-text').innerText = ui[l].check;
        document.getElementById('lbl-next').innerText = ui[l].next;
        document.getElementById('lbl-cal').innerText = ui[l].cal;
        if(document.getElementById('status').classList.contains('show')) check();
    }

    function closeModal() { document.getElementById('alertModal').style.display = 'none'; }
    function hideStatus() { document.getElementById('status').classList.remove('show'); document.getElementById('plateInput').classList.remove('error'); }

    function check() {
        const input = document.getElementById('plateInput');
        const val = input.value;
        
        if(val.length !== 4) {
            input.classList.add('error');
            document.getElementById('modal-title').innerText = ui[lang].modalT;
            document.getElementById('modal-body').innerText = ui[lang].modalB;
            document.getElementById('alertModal').style.display = 'flex';
            return;
        }

        const isOdd = parseInt(val.slice(-1)) % 2 !== 0;
        const today = new Date();
        const matches = (today.getDate() % 2 !== 0) === isOdd;
        const t = ui[lang];

        const status = document.getElementById('status');
        status.innerText = matches ? `✓ ${t.can}` : `✕ ${t.cannot}`;
        status.className = `status-msg show ${matches ? 'can' : 'cannot'}`;

        // NEXT DATES - static chips
        const nextList = document.getElementById('nextDatesList');
        nextList.innerHTML = '';
        let found = 0, d = new Date(); d.setDate(d.getDate() + 1);
        while (found < 4) {
            if ((d.getDate() % 2 !== 0) === isOdd) {
                const chip = document.createElement('div');
                chip.className = 'date-chip';
                chip.innerText = `${d.getDate()} ${t.days[d.getDay()]}`;
                nextList.appendChild(chip); found++;
            }
            d.setDate(d.getDate() + 1);
        }
        document.getElementById('nextDatesSec').classList.add('show');

        // WEEKLY SCHEDULE - last 7 days static grid
        const grid = document.getElementById('weekGrid');
        grid.innerHTML = '';
        
        for (let i = 0; i < 7; i++) {
            const date = new Date();
            // Go back 6 days from today (i=0 is 6 days ago, i=6 is today)
            date.setDate(date.getDate() - (6 - i)); 
            const dNum = date.getDate();
            const box = document.createElement('div');
            box.className = 'day-cell';
            
            // Highlight Today (matches image 2)
            if (dNum === today.getDate()) {
                box.classList.add('day-today');
                box.setAttribute('data-today', t.today);
            }
            
            // Highlight eligibility (matches image 2)
            if ((dNum % 2 !== 0) === isOdd) box.classList.add('day-active');
            
            box.innerHTML = `<span>${t.days[date.getDay()]}</span><b>${dNum}</b>`;
            grid.appendChild(box);
        }
        document.getElementById('calSec').classList.add('show');
    }
</script>
</body>
</html>
