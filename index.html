<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fuel Check SL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --primary-blue: #007AFF;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-gold: #FFD60A;
            --success-green: #34C759;
            --bg-top: #000000;
            --bg-bottom: #1c1c1e;
            --switch-bg: rgba(255,255,255,0.12);
        }

        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #000000;
            --text-muted: rgba(0, 0, 0, 0.5);
            --bg-top: #f2f2f7;
            --bg-bottom: #ffffff;
            --switch-bg: rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-top);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.5s ease;
            overflow-x: hidden;
        }

        .liquid-bg { position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom)); z-index: -1; }

        .container {
            margin: 40px 0;
            width: 92%;
            max-width: 380px;
            background: var(--glass-bg);
            backdrop-filter: blur(45px) saturate(210%);
            -webkit-backdrop-filter: blur(45px) saturate(210%);
            border-radius: 44px;
            padding: 2.2rem 1.4rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center; 
            margin-bottom: 2.5rem;
            height: 44px; 
        }

        .btn-lang-top {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0 16px;
            height: 38px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 76px; 
            height: 38px;
            background-color: var(--switch-bg);
            border-radius: 20px;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
        }

        .switch input { display: none; }
        .switch-ui { width: 100%; height: 100%; display: flex; align-items: center; }

        .switch-icons {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 16px;
            z-index: 1;
            pointer-events: none;
        }

        .slider {
            position: absolute;
            height: 32px;
            width: 32px;
            left: 3px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 2;
        }

        input:checked + .switch-ui .slider { transform: translateX(38px); }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.05em; margin: 0; }
        .clock { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); margin-bottom: 2rem; }

        .input-box {
            background: rgba(0, 0, 0, 0.1);
            border: 1.5px solid var(--glass-border);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.4s ease;
        }

        .input-box.success {
            border-color: var(--success-green);
            background: rgba(52, 199, 89, 0.05);
            box-shadow: 0 0 20px rgba(52, 199, 89, 0.2);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 3.8rem;
            font-weight: 800;
            text-align: center;
            outline: none;
            letter-spacing: 6px;
        }

        .btn-check {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 22px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s active;
        }
        
        .btn-check:active { transform: scale(0.98); }

        .status-msg {
            margin-top: 1.8rem;
            padding: 1.4rem;
            border-radius: 24px;
            display: none;
            font-weight: 700;
            text-align: center;
        }

        .status-msg.show { display: block; animation: slideUp 0.4s ease-out; }
        .can { background: rgba(52, 199, 89, 0.12); color: #34C759; border: 1px solid rgba(52, 199, 89, 0.2); }
        .cannot { background: rgba(255, 59, 48, 0.12); color: #FF3B30; border: 1px solid rgba(255, 59, 48, 0.2); }

        .section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin: 2rem 0 1rem; }
        
        .week-bar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-cell { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 10px 0; text-align: center; position: relative; }
        .day-cell span { font-size: 0.6rem; color: var(--text-muted); display: block; }
        .day-active { background: var(--primary-blue) !important; color: white !important; }
        
        .day-today { border: 2px solid var(--accent-gold); }
        .day-today::after {
            content: "TODAY";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-gold);
            color: black;
            font-size: 0.5rem;
            font-weight: 900;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .date-grid { display: flex; gap: 10px; justify-content: center; }
        .date-chip { background: var(--glass-bg); padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; font-weight: 700; border: 1px solid var(--glass-border); }

        /* User-friendly Popup */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        
        .modal {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 32px;
            text-align: center;
            max-width: 300px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .modal h2 { margin-top: 0; color: #FF3B30; font-size: 1.2rem; }
        .modal p { color: var(--text-main); font-weight: 500; margin-bottom: 1.5rem; }
        
        .btn-modal {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body data-theme="dark">

<div class="liquid-bg"></div>

<div class="modal-overlay" id="errorModal">
    <div class="modal">
        <h2 id="modalHeader">Attention</h2>
        <p id="modalMsg">Enter 4 Digits Of Vehicle Number</p>
        <button class="btn-modal" onclick="closeModal()">OK</button>
    </div>
</div>

<div class="container">
    <div class="top-nav">
        <button class="btn-lang-top" onclick="toggleLang()" id="langBtn">සිංහල</button>
        <label class="switch">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
            <div class="switch-ui">
                <div class="switch-icons"><span>🌙</span><span>☀️</span></div>
                <span class="slider"></span>
            </div>
        </label>
    </div>

    <h1 id="ui-title">Fuel Check SL</h1>
    <div id="clock" class="clock">00:00:00 AM</div>

    <div class="input-section">
        <div class="section-label" style="margin-top:0" id="ui-input-label">Enter last 4 digits</div>
        <div id="inputWrapper" class="input-box">
            <input type="text" id="plateInput" maxlength="4" placeholder="0000" inputmode="numeric" oninput="validateInput(this)">
        </div>
        <button class="btn-check" onclick="handleCheck()" id="ui-btn">Check Eligibility</button>
    </div>

    <div id="status" class="status-msg"></div>

    <div id="nextDatesSec" style="display:none">
        <div class="section-label" id="ui-next-label">Next Open Dates</div>
        <div class="date-grid" id="nextDatesList"></div>
    </div>

    <div id="calSec" style="display:none">
        <div class="section-label" id="ui-cal-label">Weekly Schedule</div>
        <div class="week-bar" id="weekGrid"></div>
    </div>
</div>

<script>
    let curLang = 0; 
    const langs = ['en', 'si', 'ta'];
    const ui = {
        en: { input: "Enter last 4 digits", btn: "Check Eligibility", can: "Eligible Today", cannot: "Not Eligible Today", days: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], next: "Next Open Dates", cal: "Weekly Schedule", btnLabel: "සිංහල", modal: "Enter 4 Digits Of Vehicle Number" },
        si: { input: "අවසාන ඉලක්කම් 4 ඇතුළත් කරන්න", btn: "පරීක්ෂා කරන්න", can: "අද අවසර ඇත", cannot: "අද අවසර නැත", days: ['ඉරි','සඳු','අඟ','බදා','බ්‍රහ','සිකු','සෙන'], next: "ඊළඟ දිනයන්", cal: "සතිපතා කාලසටහන", btnLabel: "தமிழ்", modal: "වාහන අංකයේ අවසාන ඉලක්කම් 4 ඇතුළත් කරන්න" },
        ta: { input: "கடைசி 4 எண்களை இடவும்", btn: "பரிசோதிக்கவும்", can: "இன்று அனுமதி உண்டு", cannot: "இன்று அனுமதி இல்லை", days: ['ஞாயி','திங்','செவ்','புதன்','வியா','வெள்','சனி'], next: "அடுத்த தேதிகள்", cal: "வாராந்திர அட்டவணை", btnLabel: "English", modal: "வாகன எண்ணின் கடைசி 4 இலக்கங்களை உள்ளிடவும்" }
    };

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000); updateClock();

    function validateInput(el) { 
        el.value = el.value.replace(/[^0-9]/g, ''); 
        const wrapper = document.getElementById('inputWrapper');
        if (el.value.length === 4) {
            wrapper.classList.add('success');
        } else {
            wrapper.classList.remove('success');
            // Reset visibility if user starts re-typing
            document.getElementById('status').classList.remove('show');
            document.getElementById('nextDatesSec').style.display = 'none';
            document.getElementById('calSec').style.display = 'none';
        }
    }

    function toggleTheme() {
        const isLight = document.getElementById('themeToggle').checked;
        document.body.setAttribute('data-theme', isLight ? 'light' : 'dark');
    }

    function toggleLang() {
        curLang = (curLang + 1) % 3;
        const t = ui[langs[curLang]];
        document.getElementById('ui-input-label').innerText = t.input;
        document.getElementById('langBtn').innerText = t.btnLabel;
        document.getElementById('ui-btn').innerText = t.btn;
        document.getElementById('ui-next-label').innerText = t.next;
        document.getElementById('ui-cal-label').innerText = t.cal;
        document.getElementById('modalMsg').innerText = t.modal;
        if(document.getElementById('status').classList.contains('show')) handleCheck();
    }

    function closeModal() { document.getElementById('errorModal').style.display = 'none'; }

    function handleCheck() {
        const val = document.getElementById('plateInput').value.trim();
        const t = ui[langs[curLang]];
        
        if (val.length < 4) {
            document.getElementById('errorModal').style.display = 'flex';
            return;
        }

        const isOdd = parseInt(val.slice(-1)) % 2 !== 0;
        const now = new Date();
        const matches = (isOdd === (now.getDate() % 2 !== 0));
        
        const status = document.getElementById('status');
        status.innerText = matches ? `✓ ${t.can}` : `✕ ${t.cannot}`;
        status.className = `status-msg show ${matches ? 'can' : 'cannot'}`;

        const nextList = document.getElementById('nextDatesList');
        nextList.innerHTML = '';
        let found = 0, d = new Date(); d.setDate(d.getDate() + 1);
        while (found < 3) {
            if ((d.getDate() % 2 !== 0) === isOdd) {
                const chip = document.createElement('div'); chip.className = 'date-chip';
                chip.innerText = `${d.getDate()} ${t.days[d.getDay()]}`;
                nextList.appendChild(chip); found++;
            }
            d.setDate(d.getDate() + 1);
        }
        document.getElementById('nextDatesSec').style.display = 'block';

        const grid = document.getElementById('weekGrid');
        grid.innerHTML = '';
        const start = now.getDate() - now.getDay();
        for (let i = 0; i < 7; i++) {
            const date = new Date(new Date().setDate(start + i));
            const dNum = date.getDate();
            const cell = document.createElement('div'); cell.className = 'day-cell';
            if (dNum === now.getDate()) cell.classList.add('day-today');
            if ((dNum % 2 !== 0) === isOdd) cell.classList.add('day-active');
            cell.innerHTML = `<span>${t.days[i]}</span><b>${dNum}</b>`;
            grid.appendChild(cell);
        }
        document.getElementById('calSec').style.display = 'block';
    }
</script>
</body>
</html>
